<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusX Intelligence | Deep Scan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#D4AF37;
--dark:#050A15;
--panel:rgba(15,23,42,0.7);
--text:#E2E8F0;
--muted:#94A3B8;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#050A15,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.layout{
display:flex;
gap:30px;
width:1100px;
}

.sidebar{
width:300px;
background:var(--panel);
backdrop-filter:blur(20px);
border-radius:16px;
padding:25px;
border:1px solid rgba(212,175,55,0.3);
}

.sidebar h3{
font-family:'Playfair Display',serif;
color:var(--gold);
margin-bottom:20px;
letter-spacing:2px;
}

.intel-card{
background:rgba(0,0,0,0.4);
border-radius:8px;
padding:12px;
margin-bottom:15px;
border-left:3px solid var(--gold);
}

.intel-title{
font-size:10px;
color:var(--muted);
letter-spacing:1px;
margin-bottom:4px;
}

.intel-value{
font-size:14px;
font-weight:600;
}

#scanHistory{
padding-left:18px;
font-size:12px;
color:#ccc;
}

.container{
flex:1;
background:var(--panel);
backdrop-filter:blur(20px);
padding:40px;
border-radius:16px;
border:1px solid rgba(212,175,55,0.3);
}

h2{
font-family:'Playfair Display',serif;
color:var(--gold);
text-align:center;
margin-top:0;
letter-spacing:2px;
}

.tabs{
display:flex;
border-bottom:1px solid rgba(255,255,255,0.1);
margin-bottom:25px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
font-size:12px;
color:var(--muted);
}

.tab.active{
border-bottom:2px solid var(--gold);
color:var(--gold);
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

label{
font-size:11px;
color:var(--muted);
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
background:rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.1);
border-radius:6px;
color:white;
}

button{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#BF953F,#FCF6BA,#B38728);
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

#result-box{
margin-top:25px;
padding:20px;
display:none;
border-radius:8px;
background:rgba(0,0,0,0.4);
}

.spinner{
width:40px;
height:40px;
border:3px solid rgba(255,255,255,0.1);
border-top:3px solid var(--gold);
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

.ai-text{
margin-top:15px;
font-size:13px;
line-height:1.6;
background:rgba(0,0,0,0.5);
padding:15px;
border-left:3px solid var(--gold);
border-radius:6px;
}

.pdf-btn{
margin-top:15px;
display:block;
text-align:center;
border:1px solid var(--gold);
padding:12px;
border-radius:6px;
text-decoration:none;
color:var(--gold);
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>INTELLIGENCE</h3>

<div class="intel-card">
<div class="intel-title">AI STATUS</div>
<div class="intel-value">ACTIVE</div>
</div>

<div class="intel-card">
<div class="intel-title">THREAT SCORE</div>
<div class="intel-value" id="threatScore">--</div>
</div>

<div class="intel-card">
<div class="intel-title">PLATFORM</div>
<div class="intel-value" id="platformDetect">Detecting...</div>
</div>

<div class="intel-card">
<div class="intel-title">SCAN HISTORY</div>
<ul id="scanHistory">
<li>No scans yet</li>
</ul>
</div>

<div class="intel-card">
<div class="intel-title">FRAUD INDICATORS</div>
<ul style="font-size:12px;color:#ccc;padding-left:15px">
<li>Bot Behaviour</li>
<li>Fake Followers</li>
<li>Spam Content</li>
<li>Account Age</li>
</ul>
</div>

</div>

<!-- MAIN PANEL -->

<div class="container">

<h2>Deep Scan AI</h2>

<div class="tabs">
<div class="tab active" onclick="switchTab('url')">URL Intel</div>
<div class="tab" onclick="switchTab('upload')">Image Scan</div>
</div>

<div id="url-tab" class="tab-content active">

<label>Social Media Profile Link</label>
<input type="url" id="profile_url" placeholder="https://instagram.com/username">

<button id="btn-analyze-url">
Extract & Generate PDF Report
</button>

</div>

<div id="upload-tab" class="tab-content">

<label>Profile Screenshot</label>
<input type="file" id="profile_image">

<button id="btn-analyze-image">
Analyze Image & Generate PDF
</button>

</div>

<div id="result-box"></div>

</div>

</div>

<script>

function switchTab(tab){

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'))

event.target.classList.add('active')
document.getElementById(tab+'-tab').classList.add('active')

}

function updateSidebar(data){

document.getElementById("threatScore").innerText=data.threat_score || "N/A"

document.getElementById("platformDetect").innerText=data.platform

let history=document.getElementById("scanHistory")

if(history.children[0]?.innerText==="No scans yet"){
history.innerHTML=""
}

let item=document.createElement("li")
item.innerText=data.identifier
history.prepend(item)

}

function displayFinalResult(data){

let result=document.getElementById("result-box")

result.style.display="block"

let analysis=data.ai_analysis?.replace(/\n/g,"<br>")

result.innerHTML=`

<h3 style="color:${data.prediction.includes("Fake")?"#FCA5A5":"#D4AF37"}">
${data.prediction}
</h3>

<div style="font-size:11px;color:#aaa">
Source: ${data.platform} | Target: ${data.identifier}
</div>

<div class="ai-text">

<b style="color:#D4AF37">
Gemini AI Intelligence Report
</b>

<br><br>

${analysis}

</div>

<a class="pdf-btn" href="${data.pdf_download_url}" target="_blank">

Download PDF Report

</a>

`

updateSidebar(data)

}

document.getElementById("btn-analyze-url").onclick=async()=>{

let url=document.getElementById("profile_url").value

if(!url){
alert("Enter profile URL")
return
}

let result=document.getElementById("result-box")

result.style.display="block"

result.innerHTML=`
<div class="spinner"></div>
<p style="text-align:center;color:#D4AF37">AI ANALYZING PROFILE</p>
`

let res=await fetch("http://127.0.0.1:8000/analyze_url",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url})
})

let data=await res.json()

displayFinalResult(data)

}

document.getElementById("btn-analyze-image").onclick=async()=>{

let file=document.getElementById("profile_image").files[0]

if(!file){
alert("Upload image")
return
}

let form=new FormData()

form.append("file",file)

let result=document.getElementById("result-box")

result.style.display="block"

result.innerHTML=`
<div class="spinner"></div>
<p style="text-align:center;color:#D4AF37">VISION MODEL ANALYSIS</p>
`

let res=await fetch("http://127.0.0.1:8000/analyze_upload",{
method:"POST",
body:form
})

let data=await res.json()

displayFinalResult(data)

}

</script>

</body>
</html>
